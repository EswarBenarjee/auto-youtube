name: Auto Shorts Generator

on:
  workflow_dispatch:   # manual run button
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install FFmpeg
      run: |
        sudo apt update
        sudo apt install -y ffmpeg

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Folders
      run: |
        mkdir -p assets/audio assets/clips assets/fonts output

    - name: Download Font
      run: |
        curl -L -o assets/fonts/Montserrat-Bold.ttf https://github.com/google/fonts/raw/main/ofl/montserrat/Montserrat-Bold.ttf

    - name: Restore token.pickle
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 --decode > token.pickle

    - name: Run Script
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "1" | python auto_shorts.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: videos
        path: output/
